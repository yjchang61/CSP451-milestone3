name: CD Pipeline

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        run: |
          IMAGE_NAME="${{ secrets.ACR_LOGIN_SERVER }}/cloudmart"
          COMMIT_SHA="${{ github.sha }}"
          docker build -t "$IMAGE_NAME:latest" -t "$IMAGE_NAME:$COMMIT_SHA" .
          docker push "$IMAGE_NAME:latest"
          docker push "$IMAGE_NAME:$COMMIT_SHA"

      - name: Manual deploy notice
        run: |
          echo "ACI auto-deploy skipped (no service principal permissions in lab environment)"